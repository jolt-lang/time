name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install joltc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y liblz4-1 zlib1g libtinfo6 locales
          # jolt's DateTimeFormatter localizes month/day names through libc
          # strftime, so a non-English locale must be installed on the OS (the JVM
          # bundles this; jolt, like babashka, does not). tick's suite formats a
          # French month name.
          sudo locale-gen fr_FR.UTF-8
          sudo update-locale
          url=$(curl -fsSL https://api.github.com/repos/jolt-lang/jolt/releases/latest \
                | jq -r '.assets[] | select(.name | test("x86_64-linux\\.tar\\.gz$")) | .browser_download_url')
          mkdir -p "$HOME/.jolt"
          curl -fsSL "$url" | tar xz -C "$HOME/.jolt" --strip-components=1
          chmod +x "$HOME/.jolt/joltc"
          echo "$HOME/.jolt" >> "$GITHUB_PATH"
      - name: Test
        run: JOLT_PWD="$PWD" joltc -M:test
